<!DOCTYPE html>
<html>
<head>
    <title>Anime Music Site</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Anime Music</h1>

    <a class="btn" href="/upload">Upload Music</a>

    <div class="grid">
        {% for file in files %}
        <div class="card">
            <div class="file-name">{{ file }}</div>
            <a class="download" href="/download/{{ file }}">Download</a>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
